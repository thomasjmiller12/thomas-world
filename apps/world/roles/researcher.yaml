# Role config for Researcher Thomas
# tick_cadence_minutes: how often the scheduler fires an idle tick for this agent
# tick_model: model used for autonomous idle ticks
# chat_model: model used when a visitor opens a chat session (high-quality)
# daily_token_budget: soft budget cap in USD; when exceeded, agent status → "sleeping (budget)"
#   and the scheduler skips until the next UTC day resets the meter.
#   This per-agent budget is checked before each tick. The global DAILY_BUDGET_USD
#   env var is a hard ceiling across all agents combined.

tick_cadence_minutes: 14
tick_model: claude-sonnet-4-6
chat_model: claude-opus-4-8
daily_token_budget: 3.75
